# os-fhir-server-bench — THE single source of truth.
#
# Everything tunable lives here. SECRETS DO NOT: Azure auth comes from ARM_*
# environment variables (see .env.example), never this file.
#
# Terraform reads this file directly via yamldecode(); shell scripts read it
# via bin/cfg. Edit this + .env, then run ./reproduce.sh.

azure:
  location: eastus                       # reference region; override freely
  resource_group: fhir-bench-rg
  vm_sizes:
    sut: Standard_D8s_v5                  # System-Under-Test host (8 vCPU / 32 GB)
    loadgen: Standard_D8s_v5             # load generator — must out-class the SUT
    obs: Standard_D4s_v5                 # Prometheus + Grafana (4 vCPU / 16 GB)
  spot_enabled: true                     # obs only on Spot (cheap); SUT + loadgen always Regular (loadgen runs the controller — a Spot eviction would silently kill the run)
  # Parallel mode (`make benchmark-parallel`): provision a SECOND isolated SUT+loadgen
  # stack, pinned to a DIFFERENT availability zone so the two SUTs never share a physical
  # host — two servers benchmark concurrently on separate hardware (≈ identical to running
  # them one after another, in ~half the wall-clock). false = single stack (sequential).
  parallel_stacks: false
  auto_shutdown:                         # DAILY fixed-time shutdown — DISABLED.
    enabled: false                       # a clock timer can't tell a run is in flight: the
    time: "2000"                         # 2000 UTC timer deallocated all VMs ~13 min into a
    timezone: "UTC"                      # seed and killed the run. auto_stop_when_done (below)
                                         # is the correct billing net — it stops VMs when the
                                         # RUN finishes. Re-enable only with a time outside any
                                         # run window if you want a last-resort net too.
  # When true, a detached run (make benchmark / make smoke) deallocates ALL VMs after it
  # uploads the report — compute billing stops with no laptop needed; the report is
  # safe in Blob; disks/IPs remain (cheap) until `make teardown`. Uses a managed
  # identity on the loadgen (no secrets). REQUIRES Owner/User-Access-Admin to create
  # the role assignment at provision; leave false if you only have Contributor.
  auto_stop_when_done: false
  admin_username: benchadmin
  ssh_public_key_path: ~/.ssh/id_rsa.pub
  # SECURITY: lock SSH to your IP. Set to "<your.ip>/32"; leaving 0.0.0.0/0 opens SSH to the world.
  # `make provision` runs bin/lock-ssh-ip.sh, which rewrites THIS line in place with your
  # current public IP. That means after a provision your real IP sits in this tracked file —
  # do NOT `git commit` bench.config.yaml with your IP in it; revert this line to 0.0.0.0/0
  # (the shipped default) before committing.
  allowed_ssh_cidr: 0.0.0.0/0

# Identical container resource envelope applied to EVERY server under test —
# this is what makes the comparison fair.
limits:
  sut_cpus: 4
  sut_mem: 8g
  db_cpus: 4
  db_mem: 8g

dataset:
  synthea_version: "3.3.0"               # pinned for reproducibility
  seed: 1234                             # fixed RNG seed → byte-identical bundles
  reference_date: "20240101"             # pins Synthea's "now" so ages are deterministic
  # Export only the last N years of each patient's history (0 = full life). Trims the
  # heavy tail: at 1yr the max bundle drops 64MB->7.4MB (~26k->3k resources) and total
  # volume ~5.7x, with the SAME patient count — so we keep full breadth but no monster
  # bundles that time out. Raise to 3 (max ~22MB) or 0 (full) for deeper headline runs.
  years_of_history: 1
  size: medium1y                         # small | medium1y | medium | large (headline runs use large)
  populations:                           # number of Synthea patients per tier
    small: 100                            # smoke/validation tier — fast end-to-end
    medium1y: 10000                       # 10k patients, 1yr history (years_of_history) — fast, no monster bundles
    medium: 10000                         # 10k patients, full history (the ~13h / 64MB-bundle set)
    large: 100000

# Pinned, enable/disable per server. Build/iterate with only fhir-server-go on;
# flip others on as they're added (plan steps 9-11).
servers:
  fhir-server-go:
    enabled: true
    # Built from source at a pinned commit so the SUT is exactly reproducible.
    # This commit = head of wso2/open-healthcare-prebuilt-services PR #176
    # "perf(fhir-server-go): batch index writes + cache FHIRPath ASTs on ingest" —
    # the ingest-path optimization we want to measure against the read/ingest sweep.
    repo: https://github.com/nirmal070125/open-healthcare-prebuilt-services.git
    ref: fhir-server-go/ingest-perf
    commit: f575cb7469a87eee38d530cb152c3336a0509f89
    context_subdir: miscellaneous/fhir-server-go   # build context inside the repo
    db_image: postgres:16-alpine                   # native engine for this server
    base_path: /fhir/r4
    port: 9090
    db_port: 5432                                  # host port for snapshot/restore (PG*)
    health_path: /health/ready
    # Baseline = apples-to-apples core CRUD/search, no profile-validation overhead.
    # Flip these on to measure the cost of IG validation (set the same on comparators too).
    ig_packages: ""
    validate_on_write: false
    # WriteTimeout spans whole-handler execution (Go net/http); large Synthea
    # transaction bundles need far more than the 60s default under load (PR #170).
    # 30m headroom for the dataset's giant tail (max bundle ~72 MB / ~40k resources) —
    # at 10m those could drop with CLIENT-ERR when the box is busy. Doesn't bias the
    # measured runs (reads/small ingests never approach it); it's just a safety ceiling.
    write_timeout: 30m
  hapi:                                    # HAPI FHIR JPA (Postgres) — the OSS reference comparator
    enabled: true                          # fhir-server-go vs HAPI (the de-facto reference; same PG backend)
    image: hapiproject/hapi:v7.4.0
    base_path: /fhir
    port: 8080
    db_port: 5532                          # host port for snapshot/restore (PG*)
    health_path: /fhir/metadata
    # Fair tuning (its own docs' production guidance — see servers/hapi/compose.yaml):
    # JVM heap = 75% of the container, HikariCP pool = 20 (matches our pgx pool of 20),
    # narrative generation off (CPU not under test). Validation-on-write stays off, like ours.
  microsoft:                               # Microsoft FHIR Server (SQL Server) — scaffolded
    enabled: false
    image: mcr.microsoft.com/healthcareapis/r4-fhir-server:latest
    base_path: ""
    port: 8081
    db_port: 1433                          # SQL Server
    health_path: /health/check
  ibm:                                     # IBM/LinuxForHealth FHIR (HTTPS+auth) — scaffolded
    enabled: false
    image: ghcr.io/linuxforhealth/fhir-server:latest
    base_path: /fhir-server/api/v4
    port: 9443
    db_port: 5632
    health_path: /fhir-server/api/v4/$healthcheck
  medplum:                                 # Medplum (Postgres+Redis, auth required) — scaffolded
    enabled: false
    image: medplum/medplum-server:3.2.7
    base_path: /fhir/R4
    port: 8103
    db_port: 5732
    health_path: /healthcheck
  blaze:                                   # Blaze (embedded RocksDB) — boot-verified
    enabled: false
    image: samply/blaze:0.30.0
    base_path: /fhir
    port: 8082
    health_path: /health

run:
  # Load model — how load is applied (see docs/load-model.md):
  #   closed (default): N concurrent clients (VUs), each looping send->reply->send. The
  #                     field-standard "N users" shape; directly comparable to published
  #                     FHIR benchmarks. Sweeps workload.*.concurrency_levels.
  #   open:             a fixed offered req/s on a clock; coordinated-omission-free tails.
  #                     Sweeps workload.*.rate_levels. Override with LOAD_MODEL=open.
  load_model: closed
  warmup_s: 90                           # discarded — warms JIT/page cache/pools
  measure_s: 600                         # the only data that counts (per level)
  cooldown_s: 60
  repetitions: 3                         # report median + spread
  scenarios: [read-mix, ingest]

# Per-workload load ladders (one level per measurement window; the orchestrator steps
# through them, so the curve shows where each server's knee is). The active ladder
# depends on run.load_model: closed -> concurrency_levels (# of clients); open ->
# rate_levels (req/s offered). Ladders are log-spaced and reach past where a 4-vCPU
# server saturates so the knee is bracketed. Override for smoke/iteration with
# CONCURRENCY_LEVELS="1 8 32" (closed) or RATE_LEVELS="50 200" (open).
workload:
  read-mix:                # read-dominated real-world traffic; read-only (state shared across the sweep)
    concurrency_levels: [10, 50, 100, 200, 500, 1000]   # closed: concurrent clients (VUs) — low anchor (10) for our knee + 100–1000 to match published HAPI numbers
    rate_levels: [50, 100, 200, 400]                    # open: req/s offered
  ingest:                  # transaction-bundle writes (PR #165); snapshot restored before each level
    concurrency_levels: [5, 10, 20, 50]                 # closed: writes saturate low (~DB pool of 20); dense through the knee, one plateau point
    rate_levels: [10, 25, 50, 100]                       # open: bundles/s offered

# SLO line for the headline "max sustainable throughput" — the highest offered rate
# the server keeps up with (achieved ≈ offered, no dropped iterations) while p99 < SLO
# and errors < max; full latency-vs-rate curves are published too. Default p99 is
# read-oriented (interactive GET/search). Writes are heavier, so per-scenario overrides
# apply an operation-appropriate bar — set on operation type, NOT to flatter any
# server, and applied identically to all six.
slo:
  p99_ms: 500              # default: reads (read-mix)
  max_error_rate: 0.001
  per_scenario:
    ingest:
      p99_ms: 1000         # transaction-bundle writes: 4 resources parsed + written +
                           # search-indexed in one atomic tx — sub-second is the fair bar

reporting:
  tsdb: prometheus
  artifact_store: azure_blob             # raw k6 JSON + generated reports
  blob_container: bench-results
