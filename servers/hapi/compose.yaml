# HAPI FHIR JPA Server (comparator). Postgres-backed, fixed CPU/mem envelope.
# Values come from the process env (exported by up.sh from bench.config.yaml).
name: bench-hapi

services:
  db:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "min_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "wal_buffers=64MB"
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits: { cpus: "${DB_CPUS}", memory: "${DB_MEM}" }

  server:
    image: hapiproject/hapi:v7.4.0       # mirrors bench.config.yaml servers.hapi.image
    ports:
      - "${HOST_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hapi
      SPRING_DATASOURCE_USERNAME: hapi
      SPRING_DATASOURCE_PASSWORD: hapi
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # --- Fair tuning: HAPI's own documented production guidance, so it gets a fair
      # shot (charter §1.4 "reasonably-tuned, not hand-tuned-for-us"; configs committed).
      # JVM heap = 75% of the container limit — container-aware, scales with SUT_MEM.
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
      # DB pool matched to our pgx pool (20) so the pool isn't the differentiator.
      # (HAPI perf docs: "optimize your database thread pool count".)
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "30"
      # The image's baked application.yaml sets the dialect as a MAP key
      # (spring.jpa.properties.hibernate.dialect = an H2 dialect). Plain env vars
      # can't override a map key, so we override via SPRING_APPLICATION_JSON (high
      # precedence, binds nested keys). Without this, Hibernate emits generic `clob`
      # DDL that Postgres rejects and the schema is left half-created. Same mechanism
      # turns OFF narrative generation (CPU per response, not under test — matching how
      # we run ours); validation-on-write is already off by default in the starter.
      SPRING_APPLICATION_JSON: '{"spring.jpa.properties.hibernate.dialect":"ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect","hapi.fhir.narrative_generation_enabled":false}'
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits: { cpus: "${SUT_CPUS}", memory: "${SUT_MEM}" }

volumes:
  pgdata:
