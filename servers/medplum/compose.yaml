# Medplum (comparator) — Postgres + Redis. SCAFFOLDED, not yet boot-verified.
# NOTE: Medplum ALWAYS requires auth (OAuth client-credentials) — there is no
# anonymous-write mode — so the shared dataset/seed.sh (unauthenticated POST) does
# NOT work as-is. See README for the auth/bootstrap work needed before enabling.
name: bench-medplum

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits: { cpus: "${DB_CPUS}", memory: "${DB_MEM}" }

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "medplum"]

  server:
    image: medplum/medplum-server:3.2.7    # mirrors bench.config.yaml
    ports:
      - "${HOST_PORT}:8103"
    environment:
      # Medplum reads config from env when started with the `env` source.
      MEDPLUM_PORT: "8103"
      MEDPLUM_BASE_URL: "http://localhost:${HOST_PORT}/"
      MEDPLUM_DATABASE_HOST: db
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_DATABASE_NAME: medplum
      MEDPLUM_DATABASE_USERNAME: medplum
      MEDPLUM_DATABASE_PASSWORD: medplum
      MEDPLUM_REDIS_HOST: redis
      MEDPLUM_REDIS_PASSWORD: medplum
    command: ["env"]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits: { cpus: "${SUT_CPUS}", memory: "${SUT_MEM}" }

volumes:
  pgdata:
